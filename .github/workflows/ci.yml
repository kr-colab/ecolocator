name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecolocator
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
          cache-dependency-glob: ecolocator/uv.lock
      - run: uv sync --locked
      - run: uv run pytest

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecolocator
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
          cache-dependency-glob: ecolocator/uv.lock
      - run: uv sync --locked
      - run: uv run ruff check
      - run: uv run ruff format --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
          cache-dependency-glob: ecolocator/uv.lock
      # docs/ lives at the repo root but the installable project is in ecolocator/,
      # so build from the root and point uv at the project. Mirrors .readthedocs.yaml.
      - run: uv sync --project ecolocator --locked --group docs
      - run: uv run --project ecolocator sphinx-build -T -W -b html docs docs/_build/html
