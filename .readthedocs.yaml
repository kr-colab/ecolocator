# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # The installable package lives in the ecolocator/ subdirectory and is
    # managed by uv. Install uv, then sync the package plus its docs group so
    # autodoc can import ecolocator at build time.
    install:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv sync --project ecolocator --group docs
    build:
      html:
        - uv run --project ecolocator sphinx-build -T -W -b html docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
